<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Contacto</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

.container{
    width:350px;
    margin:50px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<div class="container">

<h2>Formulario de Contacto</h2>

<form action="https://formsubmit.co/ismagonzaleezz@gmail.com" method="POST">

    <input type="text" name="Nombre" placeholder="Nombre" required>

    <input type="email" name="Correo" placeholder="Correo electrónico" required>

    <textarea name="Mensaje" rows="5" placeholder="Escribe tu mensaje"></textarea>

    <input type="hidden" name="_captcha" value="false">

    <input type="hidden" name="_next" value="https://ismagonzaleezz.github.io/formulario/">
    
    <input type="hidden" name="_subject" value="Nuevo formulario recibido">

    <button type="submit">Enviar</button>

</form>

</div>

</body>
</html>
