<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario SAFD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(8,12,20,.85),rgba(8,12,20,.90)),
    url("background.jpg") center center/cover no-repeat fixed;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 15px;
}

.container{
    width:100%;
    max-width:700px;
    background:rgba(17,22,31,.92);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 0 40px rgba(0,0,0,.45);
}

.logo{
    width:120px;
    display:block;
    margin:auto;
    margin-bottom:20px;
}

h1{
    text-align:center;
    color:#8d63ff;
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#b8c0d0;
    margin-bottom:30px;
}

.progress{
    width:100%;
    height:10px;
    background:#2a2f39;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:10px;
}

.progress div{
    width:100%;
    height:100%;
    background:linear-gradient(90deg,#4fa3ff,#7b4dff);
}

.section-title{
    color:#66a7ff;
    font-size:26px;
    margin:35px 0 20px;
    font-weight:700;
}

label{
    display:block;
    color:white;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:600;
}

input,
textarea{

    width:100%;
    background:#1f2530;
    border:1px solid #323b49;
    border-radius:10px;
    padding:15px;
    color:white;
    font-size:15px;
    transition:.3s;

}

input:focus,
textarea:focus{

    outline:none;
    border-color:#6f6cff;
    box-shadow:0 0 15px rgba(111,108,255,.4);

}

textarea{

    resize:vertical;
    min-height:150px;

}

.buttons{

    display:flex;
    gap:15px;
    margin-top:30px;

}

button{

    flex:1;
    border:none;
    padding:16px;
    border-radius:10px;
    cursor:pointer;
    font-size:17px;
    font-weight:600;
    transition:.3s;

}

.clear{

    background:#2a313d;
    color:white;

}

.clear:hover{

    background:#384352;

}

.send{

    background:linear-gradient(90deg,#4fa3ff,#7b4dff);
    color:white;

}

.send:hover{

    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(90,90,255,.35);

}

.footer{

    margin-top:25px;
    text-align:center;
    color:#8f98a9;
    font-size:13px;

}

</style>

</head>
<body>

<div class="container">

<img class="logo" src="logo.png" alt="SAFD">

<h1>Formulario SAFD</h1>

<p class="subtitle">
Completa la solicitud respondiendo todas las preguntas.
</p>

<div class="progress">
<div></div>
</div>

<div class="section-title">
Información Personal
</div>

<form action="https://formsubmit.co/ismagonzaleezz@gmail.com" method="POST">

<label>Nombre y Apellidos IC</label>
<input type="text"
name="Nombre y Apellidos IC"
placeholder="Introduce tu nombre y apellidos IC"
required>

<label>Edad</label>
<input type="number"
name="Edad"
placeholder="Introduce tu edad"
required>

<label>ID de Discord</label>
<input type="text"
name="Discord"
placeholder="Ejemplo: usuario#0001"
required>

<label>Tiempo Disponible Diario</label>
<input type="text"
name="Tiempo Disponible"
placeholder="Ejemplo: 3-4 horas"
required>

<label>Experiencia</label>
<textarea
name="Experiencia"
placeholder="Describe tu experiencia en servidores Roleplay, facciones, trabajos de emergencias, etc."
required></textarea>

<input type="hidden" name="_captcha" value="false">

<input type="hidden"
name="_subject"
value="Nueva solicitud SAFD">

<input type="hidden"
name="_next"
value="https://ismaaaglzzz.github.io/formulario/">

<div class="buttons">

<button type="reset" class="clear">
Limpiar
</button>

<button type="submit" class="send">
Enviar Solicitud
</button>

</div>

</form>

<div class="footer">
San Andreas Fire Department © 2025
</div>

</div>

</body>
</html>
